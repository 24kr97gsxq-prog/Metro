<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metropolitan Services — Load Tracking System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080f14;--card:#0d1a24;--border:#1a3044;--accent:#00c9a7;--orange:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--green:#22c55e;--text:#e2e8f0;--dim:#64748b;--navy:#0f2b3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--card)}::-webkit-scrollbar-thumb{background:#1a3d54;border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a3d54,var(--bg))}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;text-align:center}
.login-box h1{font-size:28px;font-weight:700;margin-bottom:4px}.login-box h1 span{color:var(--accent)}
.login-box p{font-size:14px;color:var(--dim);margin-bottom:30px}
.login-box input{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:#0a1520;color:var(--text);font-size:14px;font-family:'Space Mono',monospace;margin-bottom:14px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent);color:#080f14;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.3px}
.login-box button:hover{background:#00e6be}
.login-err{color:var(--red);font-size:13px;margin-bottom:10px}
.login-hint{margin-top:20px;font-size:11px;color:var(--dim)}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--navy),#0a1f2e);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar .logo{font-size:18px;font-weight:700;letter-spacing:.5px}.logo span{color:var(--accent)}
.topbar .live{display:flex;align-items:center;gap:6px;font-size:12px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav button{padding:8px 16px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.nav button.active{background:var(--accent);color:#080f14}
.nav button:not(.active){background:transparent;color:var(--dim)}
.nav button:not(.active):hover{color:var(--text);background:rgba(0,201,167,.1)}

/* CONTAINER */
.container{max-width:1400px;margin:0 auto;padding:20px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 16px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;cursor:default}
.kpi:hover{transform:translateY(-2px);border-color:var(--accent)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;font-family:'Space Mono',monospace}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:4px}

/* PANELS */
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.panel-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}.nav{gap:2px}.nav button{padding:6px 10px;font-size:11px}}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border);font-weight:600}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(26,48,68,.4);font-family:'Space Mono',monospace}
tr:hover{background:rgba(0,201,167,.04)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif}

/* GAUGE */
.gauge{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
.gauge-inner{width:140px;height:140px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-pct{font-size:38px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace}
.gauge-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

/* BARS */
.bar-bg{flex:1;height:24px;background:rgba(26,48,68,.5);border-radius:4px;overflow:hidden}
.bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;font-family:'Space Mono',monospace;transition:width .8s ease}

/* CHART */
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:180px;padding-top:20px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center}
.chart-bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height .8s ease}
.chart-val{font-size:10px;font-family:'Space Mono',monospace;margin-bottom:4px}
.chart-lbl{font-size:9px;color:var(--dim);margin-top:6px;font-family:'Space Mono',monospace}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-height:80vh;overflow:auto}

/* ADD FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px;display:block}
.form-grid input,.form-grid select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#0a1520;color:var(--text);font-size:13px;font-family:'Space Mono',monospace}
.form-grid input:focus,.form-grid select:focus{outline:none;border-color:var(--accent)}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:600;font-size:13px;cursor:pointer;letter-spacing:.3px}
.btn-accent{background:var(--accent);color:#080f14}.btn-accent:hover{background:#00e6be}
.btn-dim{background:var(--border);color:var(--dim)}

/* SETTINGS */
.plan-box{background:var(--bg);border-radius:12px;padding:20px;border:1px solid var(--accent);margin-bottom:20px}
.plan-name{font-size:24px;font-weight:700;color:var(--accent);margin:8px 0}
.plan-price{font-size:20px;font-weight:700;margin-top:12px}

/* HAULER LIST */
.hauler-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(26,48,68,.5)}
.hauler-name{font-weight:600;font-size:14px}
.hauler-tons{font-family:'Space Mono',monospace;font-size:14px;color:var(--accent)}
.hauler-sub{font-size:12px;color:var(--dim)}

footer{text-align:center;padding:24px;font-size:11px;color:var(--dim);border-top:1px solid var(--border);margin-top:30px}
footer span{color:var(--accent)}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ========== DATA STORE ==========

    {id:10,date:"2026-03-04",ticket:"83210",hauler:"Hauler A",gross:40120,tare:32690,net:7430,wood:44,plastic:0,occ:20,metal:11,concrete:0,block:0,landfill:25,project:"Healthcare Project A"},
    {id:11,date:"2026-03-04",ticket:"83213",hauler:"Hauler A",gross:38850,tare:33220,net:5660,wood:36,plastic:3,occ:27,metal:8,concrete:0,block:0,landfill:26,project:"Healthcare Project A"},

    {id:13,date:"2026-03-03",ticket:"83208",hauler:"Hauler A",gross:39420,tare:32640,net:6780,wood:63,plastic:0,occ:0,metal:0,concrete:0,block:0,landfill:37,project:"Healthcare Project A"},
    {id:14,date:"2026-03-02",ticket:"83226",hauler:"Hauler A",gross:35000,tare:32100,net:2900,wood:38,plastic:6,occ:11,metal:4,concrete:0,block:0,landfill:41,project:"Healthcare Project A"},

    {id:19,date:"2026-03-13",ticket:"82597",hauler:"Hauler D",gross:13820,tare:12960,net:860,wood:38,plastic:0,occ:17,metal:14,concrete:0,block:0,landfill:31,project:"Airport Project F"},
    {id:20,date:"2026-03-16",ticket:"82561",hauler:"Hauler D",gross:14260,tare:12160,net:2100,wood:36,plastic:3,occ:18,metal:10,concrete:0,block:0,landfill:33,project:"Airport Project F"},
  ],

    {name:"Healthcare Project A",type:"Healthcare",hauler:"Hauler A",target:50,tickets:93,tons:357.9,diverted:239.1,rate:67},
    {name:"Commercial Build-Out B",type:"Commercial Construction",hauler:"Hauler B",target:50,tickets:54,tons:117.7,diverted:81.6,rate:69},
    {name:"Hospitality Project C",type:"Aviation/Hospitality",hauler:"Hauler A",target:50,tickets:20,tons:58.7,diverted:37.8,rate:64},
    {name:"Infrastructure Project D",type:"Infrastructure",hauler:"Hauler C",target:50,tickets:5,tons:13.8,diverted:9.0,rate:65},
    {name:"Infrastructure Project E",type:"Infrastructure",hauler:"Hauler A",target:50,tickets:2,tons:6.5,diverted:5.5,rate:84},
    {name:"Airport Project F",type:"Airport Build-Out",hauler:"Hauler D",target:50,tickets:5,tons:4.9,diverted:3.9,rate:79},
  ],
  monthly: [
    {month:"Oct '25",tons:82.4,rev:10300},{month:"Nov '25",tons:118.6,rev:14825},
    {month:"Dec '25",tons:95.2,rev:11900},{month:"Jan '26",tons:142.8,rev:17850},
    {month:"Feb '26",tons:156.3,rev:19538},{month:"Mar '26",tons:128.4,rev:16050},
  ]
};

const MATS = {wood:{label:"Wood/Lumber",color:"var(--green)"},occ:{label:"OCC/Cardboard",color:"var(--orange)"},metal:{label:"Steel/Metal",color:"var(--red)"},plastic:{label:"Plastics",color:"var(--blue)"},concrete:{label:"Concrete",color:"#94a3b8"},landfill:{label:"Landfill",color:"#475569"}};

function netTons(t){return t.net/2000}
function divPct(t){return 100-t.landfill}
function render(){document.getElementById('app').innerHTML=STATE.loggedIn?renderApp():renderLogin()}

// ========== LOGIN ==========
function renderLogin(){
  return `<div class="login-wrap"><div class="login-box">
    <h1><span>METROPOLITAN</span></h1>
    <p>Load Tracking & LEED Compliance System</p>
    <input id="user" placeholder="Username" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="pass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-err"></div>
    <button onclick="doLogin()">Sign In</button>
    <div class="login-hint">Demo: metro / demo2026</div>
  </div></div>`;
}

function doLogin(){
  const u=document.getElementById('user').value.toLowerCase();
  const p=document.getElementById('pass').value;
  if(u==='metro'&&p==='demo2026'){STATE.loggedIn=true;render()}
  else document.getElementById('login-err').innerHTML='<div class="login-err">Invalid credentials</div>';
}

// ========== APP SHELL ==========
function renderApp(){
  const pages={dashboard:renderDashboard,loads:renderLoads,projects:renderProjects,reports:renderReports,qbexport:renderQBExport,settings:renderSettings};
  return `
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:16px">
        <div class="logo"><span>METROPOLITAN</span> SERVICES</div>
        <div class="live"><span class="pulse-dot"></span> LIVE</div>
      </div>
      <div class="nav">
        ${['dashboard','loads','projects','reports','qbexport','settings'].map(k=>
          `<button class="${STATE.page===k?'active':''}" onclick="nav('${k}')">${{dashboard:'Dashboard',loads:'Scale Tickets',projects:'LEED Projects',reports:'Reports',qbexport:'QB Export',settings:'Settings'}[k]}</button>`
        ).join('')}
        <button class="btn-dim" style="margin-left:8px;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;color:var(--dim)" onclick="STATE.loggedIn=false;render()">Logout</button>
      </div>
    </div>
    <div class="container fade-in">${(pages[STATE.page]||renderDashboard)()}</div>
    ${STATE.modal!==null?renderModal():''}
    ${STATE.showAddForm?renderAddForm():''}
    <footer><span>METROPOLITAN SERVICES LLC</span> — Load Tracking & LEED Compliance System | 4141 Singleton Blvd, Dallas, TX 75212 | Developed by Robert Vandling | Powered by DivertScan</footer>`;
}

function nav(p){STATE.page=p;STATE.modal=null;STATE.showAddForm=false;STATE.showImport=false;STATE.showScan=false;render()}

// ========== DASHBOARD ==========
function renderDashboard(){
  const T=STATE.tickets;
  const totalT=T.reduce((s,t)=>s+netTons(t),0);
  const totalD=T.reduce((s,t)=>s+netTons(t)*(divPct(t)/100),0);
  const dr=Math.round(totalD/totalT*100);
  const maxM=Math.max(...STATE.monthly.map(m=>m.tons));

  return `
    <div class="kpi-row">
      ${kpi('Total Loads',T.length,'This period','var(--accent)')}
      ${kpi('Total Tonnage',totalT.toFixed(1),'Tons received','var(--orange)')}
      ${kpi('Diverted',totalD.toFixed(1),'Tons from landfill','var(--green)')}
      ${kpi('Diversion Rate',dr+'%','LEED v4: 50% target','var(--blue)')}
      ${kpi('Facility Revenue','$'+(Math.round(STATE.projects.reduce((s,p)=>s+p.tons*125,0)/1000))+'K','Processing & commodity','var(--purple)')}
      ${kpi('Active Projects',STATE.projects.length,'Across 4 haulers','var(--red)')}
    </div>
    <div class="grid-3">
      <div class="panel">
        <div class="panel-title"><span class="dot" style="background:var(--accent)"></span> Recent Scale Tickets</div>
        <table><thead><tr><th>Date</th><th>Ticket</th><th>Hauler</th><th>Net(T)</th><th>Type</th><th>Div%</th></tr></thead>
        <tbody>${T.slice(0,10).map(t=>`<tr onclick="showTicket(${t.id})" style="cursor:pointer">
          <td>${t.date.slice(5)}</td><td style="color:var(--accent)">${t.ticket}</td>
          <td style="font-family:'DM Sans';font-size:12px">${t.hauler}</td>
          <td>${netTons(t).toFixed(2)}</td>
          <td><span class="tag" style="background:rgba(0,201,167,.15);color:var(--accent)">LEED C&D</span></td>
          <td style="color:${divPct(t)>=50?'var(--green)':'var(--red)'}">${divPct(t)}%</td>
        </tr>`).join('')}</tbody></table>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="dot" style="background:var(--accent)"></span> Diversion Rate</div>
        <div style="display:flex;flex-direction:column;align-items:center;padding:10px 0">
          <div class="gauge" style="background:conic-gradient(var(--accent) 0deg ${dr*3.6}deg,var(--border) ${dr*3.6}deg 360deg)">
            <div class="gauge-inner"><div class="gauge-pct">${dr}%</div><div class="gauge-label">Diverted</div></div>
          </div>
          <div style="margin-top:16px;text-align:center;font-size:13px;color:var(--dim)">
            <b style="color:var(--accent)">${totalD.toFixed(1)}T</b> diverted<br>${(totalT-totalD).toFixed(1)}T to landfill<br><br>LEED v4 Target: 50% ✓<br><b style="color:var(--green)">EXCEEDS TARGET</b>
          </div>
        </div>
      </div>
    </div>
    <div class="grid-2">
      <div class="panel">
        <div class="panel-title"><span class="dot" style="background:var(--orange)"></span> Material Breakdown</div>
        ${['wood','occ','metal','plastic','landfill'].map(m=>{
          const tot=T.reduce((s,t)=>s+netTons(t)*(t[m]/100),0);
          const pct=tot/totalT*100;
          return `<div style="display:flex;align-items:center;margin-bottom:12px">
            <div style="width:110px;font-size:13px;font-weight:500">${MATS[m].label}</div>
            <div class="bar-bg"><div class="bar" style="width:${pct}%;background:${MATS[m].color}">${pct>5?tot.toFixed(1)+'T':''}</div></div>
            <div style="width:70px;text-align:right;font-family:'Space Mono',monospace;font-size:12px;color:var(--dim);margin-left:10px">${tot.toFixed(1)}T</div>
          </div>`;
        }).join('')}
      </div>
      <div class="panel">
        <div class="panel-title"><span class="dot" style="background:var(--blue)"></span> Monthly Tonnage</div>
        <div class="chart-bars">
          ${STATE.monthly.map(m=>`<div class="chart-col">
            <div class="chart-val" style="color:var(--accent)">${m.tons}</div>
            <div class="chart-bar" style="height:${(m.tons/maxM)*100}%;background:linear-gradient(180deg,var(--accent),rgba(0,201,167,.3))"></div>
            <div class="chart-lbl">${m.month}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function kpi(label,value,sub,color){
  return `<div class="kpi" style="border-top:3px solid ${color}">
    <div class="kpi-label">${label}</div><div class="kpi-value" style="color:${color}">${value}</div><div class="kpi-sub">${sub}</div>
  </div>`;
}

// ========== LOADS ==========
function renderLoads(){
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">

function handleCSVUpload(input){
  if(input.files&&input.files[0]){
    const f=input.files[0];
    const reader=new FileReader();
    reader.onload=function(e){
      const lines=e.target.result.split('\\n');
      let imported=0;
      for(let i=1;i<lines.length;i++){
        const cols=lines[i].split(',');
        if(cols.length>=6){
          STATE.tickets.unshift({
            id:STATE.tickets.length+1+i, date:cols[0]||'2026-04-07', ticket:cols[1]||'IMP-'+i,
            hauler:cols[2]||'Imported', gross:parseInt(cols[3])||0, tare:parseInt(cols[4])||0,
            net:(parseInt(cols[3])||0)-(parseInt(cols[4])||0),
            wood:parseInt(cols[5])||0, occ:parseInt(cols[6])||0, metal:parseInt(cols[7])||0,
            plastic:parseInt(cols[8])||0, concrete:0, block:0, landfill:parseInt(cols[9])||0,
            project:cols[10]||'Imported'
          });
          imported++;
        }
      }
      STATE.showImport=false;
      render();
      alert('Imported '+imported+' tickets from '+f.name);
    };
    reader.readAsText(f);
  }
}

}

function downloadFile(content,filename,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

        <td style="font-family:'DM Sans';font-size:12px">${l.customer}</td>
        <td style="font-family:'DM Sans';font-size:11px">${l.item}</td>
        <td style="font-family:'DM Sans';font-size:11px;color:var(--dim)">${l.memo}</td>
        <td>${l.qty}</td>
        <td>$${l.rate}</td>
        <td style="color:var(--accent);font-weight:700">$${l.amount}</td>
      </tr>`).join('')}
      ${invoiceLines.length>30?`<tr><td colspan="9" style="text-align:center;color:var(--dim);font-family:'DM Sans'">... and ${invoiceLines.length-30} more lines. Export to see all.</td></tr>`:''}
      </tbody></table>
      </div>
    </div>`;
}

function exportQBIIF(){
  let iif="!TRNS\tTRNSTYPE\tDATE\tACCNT\tNAME\tCLASS\tAMOUNT\tDOCNUM\tMEMO\\n";
  iif+="!SPL\tTRNSTYPE\tDATE\tACCNT\tNAME\tCLASS\tAMOUNT\tDOCNUM\tMEMO\tQNTY\tPRICE\tINVITEM\\n";
  iif+="!ENDTRNS\\n";

  STATE.tickets.forEach(t=>{
    const tons=netTons(t);
    const amt=(tons*125).toFixed(2);
    const dt=t.date.replace(/-/g,'/');
    // Transaction header
    iif+=`TRNS\tINVOICE\t${dt}\tAccounts Receivable\t${t.project}\tRecycling\t${amt}\tMET-${t.ticket}\tLEED Processing\\n`;
    // Split line
    iif+=`SPL\tINVOICE\t${dt}\tRecycling Revenue\t${t.project}\tRecycling\t-${amt}\tMET-${t.ticket}\tTicket ${t.ticket}\t${tons.toFixed(2)}\t125.00\tLEED Landfill diversion:Roll Off\\n`;
    iif+="ENDTRNS\\n";
  });

  downloadFile(iif,'Metropolitan_QB_Import.iif','text/plain');
}

function exportQBCSV(){
  let csv="Invoice No,Invoice Date,Customer,Item,Description,Quantity,Rate,Amount,Class\\n";
  STATE.tickets.forEach(t=>{
    const tons=netTons(t);
    csv+=`MET-${t.ticket},${t.date},${t.project},LEED Landfill diversion:Roll Off,Ticket ${t.ticket},${tons.toFixed(2)},125.00,${(tons*125).toFixed(2)},Recycling\\n`;
    if(t.occ>0){
      const oT=tons*(t.occ/100);
      csv+=`MET-${t.ticket},${t.date},${t.project},CARDBOARD:OCC,OCC Bales,${oT.toFixed(2)},80.00,${(oT*80).toFixed(2)},Recycling\\n`;
    }
    if(t.metal>0){
      const mT=tons*(t.metal/100);
      csv+=`MET-${t.ticket},${t.date},${t.project},METAL:TIN,Steel/Metal,${mT.toFixed(2)},180.00,${(mT*180).toFixed(2)},Recycling\\n`;
    }
  });
  downloadFile(csv,'Metropolitan_QB_Invoices.csv','text/csv');
}

function exportQBJournal(){
  let csv="Date,Journal Entry No,Account,Debit,Credit,Description,Name,Class\\n";
  let jeNum=1001;
  STATE.tickets.forEach(t=>{
    const tons=netTons(t);
    const amt=(tons*125).toFixed(2);
    csv+=`${t.date},JE-${jeNum},Accounts Receivable,${amt},,LEED Processing - Ticket ${t.ticket},${t.project},Recycling\\n`;
    csv+=`${t.date},JE-${jeNum},Recycling Revenue,,${amt},LEED Processing - Ticket ${t.ticket},${t.project},Recycling\\n`;
    jeNum++;
  });
  downloadFile(csv,'Metropolitan_QB_Journal_Entries.csv','text/csv');
}

function exportCommoditySummary(){
  const T=STATE.tickets;
  let csv="Commodity,Total Loads,Total Net (lbs),Total Tons,Avg Price/Ton,Total Revenue,Class\\n";

  // LEED
  const leedTons=T.reduce((s,t)=>s+netTons(t),0);
  csv+=`LEED Processing,${T.length},${T.reduce((s,t)=>s+t.net,0)},${leedTons.toFixed(2)},125.00,${(leedTons*125).toFixed(2)},Recycling\\n`;

  // OCC
  const occTons=T.reduce((s,t)=>s+netTons(t)*(t.occ/100),0);
  const occLoads=T.filter(t=>t.occ>0).length;
  csv+=`CARDBOARD:OCC,${occLoads},${Math.round(occTons*2000)},${occTons.toFixed(2)},80.00,${(occTons*80).toFixed(2)},Recycling\\n`;

  // Metal
  const metalTons=T.reduce((s,t)=>s+netTons(t)*(t.metal/100),0);
  const metalLoads=T.filter(t=>t.metal>0).length;
  csv+=`METAL:TIN,${metalLoads},${Math.round(metalTons*2000)},${metalTons.toFixed(2)},180.00,${(metalTons*180).toFixed(2)},Recycling\\n`;

  // Wood
  const woodTons=T.reduce((s,t)=>s+netTons(t)*(t.wood/100),0);
  const woodLoads=T.filter(t=>t.wood>0).length;
  csv+=`WOOD:LUMBER,${woodLoads},${Math.round(woodTons*2000)},${woodTons.toFixed(2)},0.00,0.00,Recycling\\n`;

  // Plastic
  const plasticTons=T.reduce((s,t)=>s+netTons(t)*(t.plastic/100),0);
  const plasticLoads=T.filter(t=>t.plastic>0).length;
  csv+=`PLASTICS,${plasticLoads},${Math.round(plasticTons*2000)},${plasticTons.toFixed(2)},0.00,0.00,Recycling\\n`;

  csv+=`\\nReport Generated:,${new Date().toISOString().slice(0,10)}\\n`;
  csv+=`Facility:,Metropolitan Services LLC\\n`;
  csv+=`Address:,"4141 Singleton Blvd, Dallas TX 75212"\\n`;

  downloadFile(csv,'Metropolitan_Commodity_Summary.csv','text/csv');
}
